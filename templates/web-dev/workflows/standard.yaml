# 표준 개발 워크플로우
id: standard
name: Standard Development
description: |
  분석 → 설계 → 구현 → 검증 → 배포 → 문서화
  표준 개발 프로세스

# 단계 정의
stages:
  - id: analysis
    name: Analysis
    description: 요청 분석 및 코드베이스 파악
    agent: explorer
    type: Explore
    task: |
      요청에 필요한 코드베이스 분석:
      1. 관련 파일 및 모듈 파악
      2. 의존성 분석
      3. 영향 범위 평가
    outputs:
      - analysis-report

  - id: design
    name: Design
    description: 구현 설계
    agent: architect
    type: Plan
    dependsOn:
      - analysis
    task: |
      분석 결과를 바탕으로 구현 계획 수립:
      1. 아키텍처 결정
      2. 태스크 분해
      3. 인터페이스 정의
    outputs:
      - design-doc

  - id: impl-frontend
    name: Frontend Implementation
    description: 프론트엔드 코드 구현
    agent: frontend
    type: general-purpose
    dependsOn:
      - design
    parallel: true
    optional: true
    condition: "{{HAS_FRONTEND}}"
    task: |
      프론트엔드 구현:
      설계 문서에 따라 UI 컴포넌트 개발
    outputs:
      - source-code

  - id: impl-backend
    name: Backend Implementation
    description: 백엔드 코드 구현
    agent: backend
    type: general-purpose
    dependsOn:
      - design
    parallel: true
    optional: true
    condition: "{{HAS_BACKEND}}"
    task: |
      백엔드 구현:
      설계 문서에 따라 API 및 비즈니스 로직 개발
    outputs:
      - source-code

  - id: verification
    name: Verification
    description: 테스트 및 검증
    agent: qa
    type: general-purpose
    dependsOn:
      - impl-frontend
      - impl-backend
    task: |
      구현 결과 검증:
      1. 단위 테스트 실행
      2. 통합 테스트
      3. 버그 리포트
    outputs:
      - test-report
    gate:
      type: quality
      criteria:
        - all-tests-pass
        - no-critical-bugs

  - id: deployment
    name: Deployment
    description: 빌드 및 배포
    agent: devops
    type: Bash
    dependsOn:
      - verification
    optional: true
    condition: "{{DEPLOY_ENABLED}}"
    task: |
      배포 실행:
      1. 빌드
      2. 컨테이너 배포
      3. 헬스체크
    outputs:
      - deployment-log

  - id: documentation
    name: Documentation
    description: 문서 업데이트
    agent: documenter
    type: general-purpose
    dependsOn:
      - impl-frontend
      - impl-backend
    parallel: true
    task: |
      문서 업데이트:
      1. README 업데이트
      2. CHANGELOG 추가
      3. API 문서 (필요시)
    outputs:
      - documentation

# 체크포인트 설정
checkpoints:
  enabled: true
  stages:
    - design
    - verification

# 실패 처리
onFailure:
  strategy: pause
  notify:
    - webhook
