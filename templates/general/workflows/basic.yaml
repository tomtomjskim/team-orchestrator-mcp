# 기본 워크플로우
id: basic
name: Basic Workflow
description: |
  분석 → 구현 → 검증
  간단한 3단계 프로세스

stages:
  - id: analysis
    name: Analysis
    description: 요청 분석 및 코드베이스 파악
    agent: explorer
    type: Explore
    task: |
      요청 분석:
      1. 관련 파일 파악
      2. 수정 범위 평가
    outputs:
      - analysis-report

  - id: implementation
    name: Implementation
    description: 코드 구현
    agent: developer
    type: general-purpose
    dependsOn:
      - analysis
    task: |
      분석 결과를 바탕으로 구현
    outputs:
      - source-code

  - id: verification
    name: Verification
    description: 구현 검증
    agent: tester
    type: general-purpose
    dependsOn:
      - implementation
    task: |
      구현 결과 검증:
      1. 코드 리뷰
      2. 테스트 실행
    outputs:
      - test-report

checkpoints:
  enabled: false

onFailure:
  strategy: continue
